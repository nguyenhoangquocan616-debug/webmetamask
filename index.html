<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nhom 8 Token - Nhận Token Miễn Phí</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.37);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.18);
    }
    h1 {
      margin-bottom: 10px;
      font-size: 2.8rem;
    }
    .subtitle {
      margin-bottom: 30px;
      opacity: 0.9;
    }
    button {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      margin: 12px;
      transition: all 0.3s;
    }
    button:hover {
      background: #ff4757;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255,107,107,0.4);
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #status {
      margin-top: 25px;
      font-size: 1.1rem;
      min-height: 60px;
    }
    .info {
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
    }
    .address {
      word-break: break-all;
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 8px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Nhom 8 Token</h1>
  <p class="subtitle">NHOM8 — Token nhóm 8</p>

  <div class="info">
    <p>Contract: <span id="contractAddr">Chưa có contract (test ví)</span></p>
    <p id="yourAddress">Địa chỉ ví: chưa kết nối</p>
    <p id="yourBalance">Số dư NHOM8: 0 (chưa kết nối contract)</p>
  </div>

  <button id="connectBtn">Kết nối MetaMask</button>
  <button id="claimBtn" disabled>Nhận 100 NHOM8</button>

  <div id="status"></div>
</div>

<script>
// === CÁC GIÁ TRỊ CHÍNH (tạm tắt contract để test) ===
const CONTRACT_ADDRESS = "";  // Tạm bỏ để test kết nối ví (sẽ thêm sau)
const CLAIM_AMOUNT     = "100000000000000000000"; // 100 token (18 decimals)
const YOUR_WALLET      = "";  // Tạm bỏ (ví deployer)

// ABI (giữ nguyên nhưng chưa dùng)
const TOKEN_ABI = [
  {
    "constant": true,
    "inputs": [{"name": "_owner", "type": "address"}],
    "name": "balanceOf",
    "outputs": [{"name": "balance", "type": "uint256"}],
    "type": "function"
  },
  {
    "constant": false,
    "inputs": [
      {"name": "_to", "type": "address"},
      {"name": "_value", "type": "uint256"}
    ],
    "name": "transfer",
    "outputs": [{"name": "success", "type": "bool"}],
    "type": "function"
  }
];

let web3;
let userAccount;

// Kết nối MetaMask
async function connectWallet() {
  const status = document.getElementById("status");
  const connectBtn = document.getElementById("connectBtn");

  if (!window.ethereum) {
    status.innerHTML = "Vui lòng cài MetaMask!";
    return;
  }

  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAccount = accounts[0];

    web3 = new Web3(window.ethereum);

    // Tạm không khởi tạo contract để tránh lỗi
    // tokenContract = new web3.eth.Contract(TOKEN_ABI, CONTRACT_ADDRESS);

    document.getElementById("yourAddress").innerHTML = 
      `Địa chỉ ví: <span class="address">${userAccount}</span>`;

    document.getElementById("contractAddr").innerHTML = 
      `Chưa có contract (test ví)`;

    connectBtn.innerHTML = "Đã kết nối ✓";
    connectBtn.disabled = true;

    // Tạm không update balance (vì chưa có contract)
    document.getElementById("yourBalance").innerHTML = 
      `Số dư NHOM8: 0 (chưa kết nối contract)`;

    // Tạm disable nút claim vì chưa có contract
    // document.getElementById("claimBtn").disabled = false;

    status.innerHTML = "Kết nối ví thành công! (Contract chưa được thêm)";
  } catch (err) {
    console.error(err);
    status.innerHTML = "Kết nối thất bại: " + (err.message || err);
  }
}

// Tạm tắt function claim (sẽ bật lại sau khi có contract)
async function claimToken() {
  document.getElementById("status").innerHTML = 
    "Chưa có contract hợp lệ. Vui lòng thêm địa chỉ contract thật!";
}

// Sự kiện
document.getElementById("connectBtn").addEventListener("click", connectWallet);
document.getElementById("claimBtn").addEventListener("click", claimToken);

// Tự động reconnect nếu đã connect trước đó
window.addEventListener("load", async () => {
  if (window.ethereum && window.ethereum.selectedAddress) {
    await connectWallet();
  }
});
</script>

</body>
</html>
